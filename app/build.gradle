plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wzdev.saasserver'
    compileSdk 35

    defaultConfig {
        applicationId 'com.wzdev.saasserver'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
